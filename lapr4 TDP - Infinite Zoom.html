  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

-accent {\n    font-family: 'Bebas Neue', sans-serif;\n    font-size: 380px;\n    letter-spacing: 0.04em;\n    line-height: 1;\n    color: oklch(72% 0.22 198);\n  }\n  .t-label {\n    font-family: 'DM Mono', monospace;\n    font-size: 52px;\n    font-weight: 300;\n    letter-spacing: 0.3em;\n    text-transform: uppercase;\n    color: oklch(72% 0.22 198);\n  }\n  .t-section {\n    font-family: 'Bebas Neue', sans-serif;\n    font-size: 260px;\n    letter-spacing: 0.06em;\n    color: #f0ece6;\n    text-align: center;\n  }\n  .t-body {\n    font-family: 'DM Sans', sans-serif;\n    font-size: 68px;\n    font-weight: 200;\n    line-height: 1.55;\n    color: rgba(240,236,230,0.5);\n    text-align: center;\n    max-width: 1600px;\n    white-space: normal;\n  }\n  .t-mono {\n    font-family: 'DM Mono', monospace;\n    font-size: 38px;\n    font-weight: 300;\n    color: rgba(240,236,230,0.3);\n    letter-spacing: 0.12em;\n    text-align: center;\n  }\n  .t-num {\n    font-family: 'Bebas Neue', sans-serif;\n    font-size: 220px;\n    color: oklch(72% 0.22 198);\n    line-height: 1;\n  }\n  .t-ghost {\n    font-family: 'Bebas Neue', sans-serif;\n    font-size: 700px;\n    color: rgba(255,255,255,0.03);\n    line-height: 1;\n    letter-spacing: -0.02em;\n  }\n  .h-line {\n    width: 1000px; height: 2px;\n    background: linear-gradient(90deg, transparent, oklch(72% 0.22 198), transparent);\n  }\n  .ring {\n    border-radius: 50%;\n    border: 2px solid rgba(32,200,220,0.2);\n  }\n  .feat-card {\n    text-align: center;\n    padding: 60px 80px;\n    border: 1px solid rgba(240,236,230,0.08);\n    border-radius: 8px;\n    backdrop-filter: blur(2px);\n  }\n  .feat-card .feat-title {\n    font-family: 'Bebas Neue', sans-serif;\n    font-size: 110px;\n    color: #f0ece6;\n    letter-spacing: 0.04em;\n  }\n  .feat-card .feat-sub {\n    font-family: 'DM Mono', monospace;\n    font-size: 34px;\n    color: rgba(240,236,230,0.35);\n    margin-top: 20px;\n    letter-spacing: 0.08em;\n  }\n  .avatar {\n    width: 260px; height: 260px;\n    border-radius: 50%;\n    background: rgba(240,236,230,0.05);\n    border: 2px solid rgba(240,236,230,0.15);\n    margin: 0 auto 40px;\n  }\n  .member-name {\n    font-family: 'Bebas Neue', sans-serif;\n    font-size: 90px;\n    color: #f0ece6;\n    letter-spacing: 0.04em;\n  }\n  .member-role {\n    font-family: 'DM Mono', monospace;\n    font-size: 32px;\n    color: rgba(240,236,230,0.3);\n    letter-spacing: 0.1em;\n    margin-top: 10px;\n  }\n\n  /* HUD */\n  #hud {\n    position: fixed;\n    bottom: 56px; left: 50%;\n    transform: translateX(-50%);\n    z-index: 9999;\n    display: flex; align-items: center; gap: 28px;\n    font-family: 'DM Mono', monospace;\n    font-size: 24px;\n    color: rgba(240,236,230,0.25);\n    letter-spacing: 0.2em;\n    pointer-events: none;\n  }\n  #bar { width: 280px; height: 1px; background: rgba(240,236,230,0.1); }\n  #fill { height:100%; background: oklch(72% 0.22 198); width:0%; }\n<\u002Fstyle>\n\n<\u002Fhead>\n<body>\n<div id=\"track\">\n  <div id=\"stage\">\n    <div id=\"grid\"><\u002Fdiv>\n    <div id=\"glow\"><\u002Fdiv>\n    <!-- elements injected by JS -->\n    <div id=\"vignette\"><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<div id=\"hud\">\n  <span id=\"hud-section\">INTRO<\u002Fspan>\n  <div id=\"bar\"><div id=\"fill\"><\u002Fdiv><\u002Fdiv>\n  <span id=\"hud-pct\">0%<\u002Fspan>\n<\u002Fdiv>\n\n<script>\n// ─────────────────────────────────────────\n//  SCALE STAGE\n// ─────────────────────────────────────────\nconst DESIGN_W = 3840, DESIGN_H = 2160;\nconst stage = document.getElementById('stage');\nfunction scaleStage() {\n  const s = Math.min(window.innerWidth/DESIGN_W, window.innerHeight/DESIGN_H);\n  const ox = (window.innerWidth  - DESIGN_W*s)/2;\n  const oy = (window.innerHeight - DESIGN_H*s)/2;\n  stage.style.transform = `translate(${ox}px,${oy}px) scale(${s})`;\n}\nscaleStage();\nwindow.addEventListener('resize', scaleStage);\n\n// ─────────────────────────────────────────\n//  ELEMENT DEFINITIONS\n//  Each element:\n//    wx, wy  — world position offset from center (at scale=1)\n//    depth   — camera depth when element is \"in focus\"\n//    html    — inner HTML\n//    cls     — className\n//    fadeIn  — relZ range to fade in  (default -1.8 → -0.6)\n//    fadeOut — relZ range to fade out (default  0.3 →  1.2)\n// ─────────────────────────────────────────\nconst ELEMENTS = [\n\n  // ── SCENE 1: INTRO ──────────────────────────────\n  { depth:1.0, wx:0,     wy:-540, cls:'t-label',           html:'LAPR4 · ISEP · 2026' },\n  { depth:1.2, wx:-520,  wy:-120, cls:'t-display',         html:'PROJECT' },\n  { depth:1.2, wx: 560,  wy:-120, cls:'t-display-accent',  html:'NAME' },\n  { depth:1.6, wx:0,     wy: 220, cls:'t-body',            html:'Stub text — testing the infinite zoom mechanic' },\n  { depth:2.0, wx:0,     wy: 480, cls:'h-line',            html:'' },\n  { depth:2.2, wx:0,     wy: 620, cls:'t-mono',            html:'scroll to fly through ↓' },\n  // ghost bg\n  { depth:0.6, wx:-600,  wy:-200, cls:'t-ghost',           html:'01', fadeIn:[-2.5,-1.5], fadeOut:[0.1,0.9] },\n\n  // ── SCENE 2: OVERVIEW ───────────────────────────\n  { depth:3.4, wx:0,     wy:-560, cls:'t-label',           html:'Overview' },\n  { depth:3.8, wx:0,     wy:-180, cls:'t-section',         html:'WHAT IS IT?' },\n  { depth:4.2, wx:0,     wy: 220, cls:'t-body',            html:'This is stub text describing the project overview.<br>Replace with the real abstract or elevator pitch.' },\n  { depth:4.6, wx:0,     wy: 500, cls:'h-line',            html:'' },\n  // stats fan out from center\n  { depth:5.0, wx:-900,  wy: 700, cls:'',                  html:'<div class=\"t-num\">99<\u002Fdiv><div class=\"t-mono\">STUB METRIC A<\u002Fdiv>' },\n  { depth:5.0, wx:0,     wy: 700, cls:'',                  html:'<div class=\"t-num\" style=\"color:#f0ece6\">∞<\u002Fdiv><div class=\"t-mono\">STUB METRIC B<\u002Fdiv>' },\n  { depth:5.0, wx: 900,  wy: 700, cls:'',                  html:'<div class=\"t-num\" style=\"color:oklch(72% 0.22 320)\">X<\u002Fdiv><div class=\"t-mono\">STUB METRIC C<\u002Fdiv>' },\n  { depth:3.0, wx:-600,  wy:-200, cls:'t-ghost',           html:'02', fadeIn:[-2.5,-1.5], fadeOut:[0.1,0.9] },\n\n  // ── SCENE 3: FEATURES ───────────────────────────\n  { depth:7.0, wx:0,     wy:-580, cls:'t-label',           html:'Key Features' },\n  // 5 feature cards zoom in and spread outward\n  { depth:7.4, wx:-1200, wy:-150, cls:'feat-card',         html:'<div class=\"feat-title\">Feature A<\u002Fdiv><div class=\"feat-sub\">Stub description<\u002Fdiv>' },\n  { depth:7.6, wx:    0, wy:-480, cls:'feat-card',         html:'<div class=\"feat-title\">Feature B<\u002Fdiv><div class=\"feat-sub\">Stub description<\u002Fdiv>' },\n  { depth:7.4, wx: 1200, wy:-150, cls:'feat-card',         html:'<div class=\"feat-title\">Feature C<\u002Fdiv><div class=\"feat-sub\">Stub description<\u002Fdiv>' },\n  { depth:7.8, wx: -620, wy: 400, cls:'feat-card',         html:'<div class=\"feat-title\">Feature D<\u002Fdiv><div class=\"feat-sub\">Stub description<\u002Fdiv>' },\n  { depth:7.8, wx:  620, wy: 400, cls:'feat-card',         html:'<div class=\"feat-title\">Feature E<\u002Fdiv><div class=\"feat-sub\">Stub description<\u002Fdiv>' },\n  { depth:6.5, wx:-600,  wy:-200, cls:'t-ghost',           html:'03', fadeIn:[-2.5,-1.5], fadeOut:[0.1,0.9] },\n\n  // ── SCENE 4: TEAM ───────────────────────────────\n  { depth:10.0, wx:0,    wy:-580, cls:'t-label',           html:'Team' },\n  { depth:10.2, wx:0,    wy:-220, cls:'t-section',         html:'THE TEAM' },\n  // 4 members zoom and spread\n  { depth:10.6, wx:-1100,wy: 350, cls:'',                  html:'<div class=\"avatar\"><\u002Fdiv><div class=\"member-name\">Member A<\u002Fdiv><div class=\"member-role\">Role Stub<\u002Fdiv>', style:'text-align:center' },\n  { depth:10.6, wx: -350,wy: 350, cls:'',                  html:'<div class=\"avatar\" style=\"border-color:oklch(72% 0.22 198)\"><\u002Fdiv><div class=\"member-name\" style=\"color:oklch(72% 0.22 198)\">Member B<\u002Fdiv><div class=\"member-role\">Role Stub<\u002Fdiv>', style:'text-align:center' },\n  { depth:10.6, wx:  350,wy: 350, cls:'',                  html:'<div class=\"avatar\"><\u002Fdiv><div class=\"member-name\">Member C<\u002Fdiv><div class=\"member-role\">Role Stub<\u002Fdiv>', style:'text-align:center' },\n  { depth:10.6, wx: 1100,wy: 350, cls:'',                  html:'<div class=\"avatar\" style=\"border-color:oklch(72% 0.22 320)\"><\u002Fdiv><div class=\"member-name\" style=\"color:oklch(72% 0.22 320)\">Member D<\u002Fdiv><div class=\"member-role\">Role Stub<\u002Fdiv>', style:'text-align:center' },\n  { depth:9.5,  wx:-600, wy:-200, cls:'t-ghost',           html:'04', fadeIn:[-2.5,-1.5], fadeOut:[0.1,0.9] },\n];\n\n// ─────────────────────────────────────────\n//  BUILD DOM\n// ─────────────────────────────────────────\nconst domEls = ELEMENTS.map(def => {\n  const div = document.createElement('div');\n  div.className = 'el' + (def.cls ? ' ' + def.cls : '');\n  div.innerHTML = def.html;\n  if (def.style) div.setAttribute('style', def.style);\n  stage.insertBefore(div, document.getElementById('vignette'));\n  return div;\n});\n\n// ─────────────────────────────────────────\n//  ZOOM RENDER\n//  Camera travels from 0 → CAM_MAX as scroll goes 0→1\n// ─────────────────────────────────────────\nconst CAM_MAX = 12;   // total depth units\nconst ZOOM_K  = 2.2;  // how fast scale grows: scale = exp(relZ * ZOOM_K)\n\nfunction easeInOutSine(t) {\n  return -(Math.cos(Math.PI * t) - 1) / 2;\n}\n\nconst sectionNames = ['INTRO','OVERVIEW','FEATURES','TEAM'];\nconst sectionDepths = [1.2, 3.8, 7.4, 10.2];\n\nfunction render() {\n  const maxScroll = document.documentElement.scrollHeight - window.innerHeight;\n  const rawT = Math.max(0, Math.min(1, window.scrollY / maxScroll));\n  const camZ = rawT * CAM_MAX;\n\n  // HUD\n  document.getElementById('fill').style.width = (rawT * 100) + '%';\n  document.getElementById('hud-pct').textContent = Math.round(rawT * 100) + '%';\n  let si = 0;\n  for (let i = sectionDepths.length - 1; i >= 0; i--) {\n    if (camZ >= sectionDepths[i] - 1.5) { si = i; break; }\n  }\n  document.getElementById('hud-section').textContent = sectionNames[si];\n\n  ELEMENTS.forEach((def, i) => {\n    const el = domEls[i];\n    const relZ = camZ - def.depth;  // <0 = not yet reached, 0 = focus, >0 = past\n\n    // opacity\n    const fi = def.fadeIn  || [-1.8, -0.5];\n    const fo = def.fadeOut || [ 0.4,  1.4];\n    let opacity = 0;\n    if (relZ >= fi[0] && relZ < fi[1]) {\n      opacity = (relZ - fi[0]) / (fi[1] - fi[0]);\n    } else if (relZ >= fi[1] && relZ <= fo[0]) {\n      opacity = 1;\n    } else if (relZ > fo[0] && relZ <= fo[1]) {\n      opacity = 1 - (relZ - fo[0]) / (fo[1] - fo[0]);\n    }\n\n    if (opacity <= 0.001) {\n      el.style.opacity = 0;\n      return;\n    }\n\n    // scale: exponential zoom\n    const scale = Math.exp(relZ * ZOOM_K);\n\n    // screen position: world position scaled by current scale\n    const sx = def.wx * scale;\n    const sy = def.wy * scale;\n\n    el.style.opacity   = opacity;\n    el.style.transform = `translate(calc(-50% + ${sx}px), calc(-50% + ${sy}px)) scale(${scale})`;\n  });\n\n  requestAnimationFrame(render);\n}\nrender();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
